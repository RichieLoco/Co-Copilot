name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ### Docker
            ```bash
            docker run -d -p 3000:3000 ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Docker Compose
            Edit `docker-compose.yml` to use the tagged image, then:
            ```bash
            docker compose up -d
            ```

            ### Bare metal
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd co-copilot
            git checkout ${{ github.ref_name }}
            npm install && npm run build && npm start
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) for full setup instructions.
